# ==================== LoRA 消融实验配置 ====================
# 用于系统性研究 LoRA 超参数对遥感描述任务的影响

ablation_rank:
  # LoRA rank 消融：A1
  values: [8, 16, 32, 64]
  default: 16

ablation_target_modules:
  # 目标模块消融：A2
  values:
    - ["q_proj", "v_proj"]                          # 最精简配置
    - ["q_proj", "k_proj", "v_proj", "o_proj"]      # 仅注意力层
    - ["all-linear"]                                 # 所有线性层
  default: ["q_proj", "k_proj", "v_proj", "o_proj"]

ablation_alpha:
  # LoRA alpha 消融
  values: [8, 16, 32, 64]
  default: 32

lora_dropout:
  values: [0.0, 0.05, 0.1]
  default: 0.05
